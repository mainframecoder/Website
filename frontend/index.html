<!DOCTYPE html>
<html>
<head>
  <title>My Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="glass">
  <h1 onclick="goHome()">🛒 My Store</h1>

  <input type="text" id="search" placeholder="Search..." onkeyup="searchProducts()">

  <select onchange="filterCategory(this.value)">
    <option value="all">All Categories</option>
    <option value="clothing">Clothing</option>
    <option value="footwear">Footwear</option>
    <option value="accessories">Accessories</option>
  </select>

  <select onchange="filterPrice(this.value)">
    <option value="all">All Prices</option>
    <option value="low">Below $50</option>
    <option value="mid">$50 - $100</option>
    <option value="high">Above $100</option>
  </select>

  <button class="cart-btn" onclick="openCart()">
    🛍 Cart (<span id="cartCount">0</span>)
  </button>
</header>

<div id="products" class="products"></div>

<!-- CART -->
<div id="cartModal" class="modal">
  <div class="modal-content glass">
    <span class="close" onclick="closeCart()">×</span>

    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>

    <input id="address" placeholder="Delivery Address">
    <input id="email" placeholder="Email">

    <button class="checkout-btn" onclick="checkout()">Checkout</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
