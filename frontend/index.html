<!DOCTYPE html>
<html>
<head>
  <title>My Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="container header-inner">

    <h1 onclick="goHome()">🛒 My Store</h1>

    <input id="search" placeholder="Search..." onkeyup="searchProducts()">

    <select onchange="filterCategory(this.value)">
      <option value="">All Categories</option>
      <option value="clothing">Clothing</option>
      <option value="footwear">Footwear</option>
      <option value="accessories">Accessories</option>
    </select>

    <!-- AUTH -->
    <div class="auth-section">
      <input id="loginEmail" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">

      <button class="btn-primary" onclick="login()">Login</button>
      <button class="btn-secondary" onclick="signup()">Sign Up</button>
      <button class="btn-secondary" onclick="goOrders()">Orders</button>
    </div>

    <button class="cart-btn" id="cartBtn">
      🛒 Cart (<span id="cartCount">0</span>)
    </button>

  </div>
</header>

<div class="container">
  <div class="products" id="products"></div>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="modal">
  <div class="modal-content">

    <span class="close-btn" onclick="closeCart()">✖</span>

    <h2>Your Cart</h2>

    <div id="cartItems"></div>
    <h3 id="total"></h3>

    <input id="address" placeholder="Delivery Address">
    <input id="email" placeholder="Email">

    <button class="checkout-btn" onclick="checkout()">Checkout</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
