<!DOCTYPE html>
<html>
<head>
  <title>My Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 My Store</h1>
  <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
</header>

<div class="products" id="products"></div>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- CART -->
<div id="cartPanel" class="cart">

  <div class="cart-header">
    <h2>Your Cart</h2>
    <span id="closeCart" class="close-btn">✖</span>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <h3>Total: $<span id="total">0</span> CAD</h3>
    <button id="checkoutBtn" class="checkout">Checkout</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
