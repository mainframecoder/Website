<!DOCTYPE html>
<html>
<head>
  <title>My Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🛒 My Store</h1>

  <input type="text" id="search" placeholder="Search..." onkeyup="searchProducts()">

  <button onclick="openCart()">🛍 Cart (<span id="cartCount">0</span>)</button>
</header>

<div id="products" class="products"></div>

<!-- 🔥 CART POPUP -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <span onclick="closeCart()" class="close">&times;</span>
    <h2>Your Cart</h2>

    <div id="cartItems"></div>
    <h3 id="total"></h3>

    <input id="address" placeholder="Delivery Address">
    <input id="email" placeholder="Email">

    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
