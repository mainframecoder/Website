<!DOCTYPE html>
<html>
<head>
  <title>My Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h1>🛒 My Store</h1>

  <input type="text" placeholder="Search..." oninput="searchProducts(this.value)">

  <select onchange="filterPrice(this.value)">
    <option value="all">All</option>
    <option value="below">Under $50</option>
    <option value="above">Above $50</option>
  </select>

  <button class="cart-btn" onclick="toggleCart()">
    🛒 <span id="cartCount">0</span>
  </button>
</div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

<!-- CART -->
<div id="overlay" class="overlay" onclick="toggleCart()"></div>

<div id="cart" class="cart">
  <h2>Your Cart</h2>

  <div id="cartItems"></div>

  <h3>Total: <span id="cartTotal">$0</span></h3>

  <button id="checkoutBtn" onclick="checkout()">Checkout</button>
</div>

<script src="script.js"></script>

</body>
</html>
