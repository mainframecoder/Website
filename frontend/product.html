<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <h1 onclick="goHome()">My Store</h1>
    <div>Cart (<span id="cartCount">0</span>)</div>
  </div>
</header>

<div class="container" id="productPage"></div>

<script>
const API = "https://website-9gq9.onrender.com";

let cart = JSON.parse(localStorage.getItem("cart") || "{}");

let product = null;
let selectedColor = null;
let selectedSize = null;

/* INIT */
updateCart();

/* LOAD PRODUCT */
const id = new URLSearchParams(location.search).get("id");

fetch(API + "/products/" + id)
.then(res => res.json())
.then(data => {
  product = data;

  selectedColor = product.variants[0].color;
  selectedSize = product.variants[0].size;

  render();
});

/* RENDER */
function render(){

  const variants = product.variants;

  // FILTER variants by selected color
  const filtered = variants.filter(v => v.color === selectedColor);

  const current = filtered.find(v => v.size === selectedSize) || filtered[0];

  document.getElementById("productPage").innerHTML = `
    <div class="product">

      <!-- IMAGE -->
      <div>
        <img src="${current.image}" class="main-img">
      </div>

      <!-- INFO -->
      <div>

        <h1>${product.name}</h1>
        <h2>$${current.price}</h2>
        <p>${product.description}</p>

        <!-- COLOR -->
        <label>Color</label>
        <div>
          ${[...new Set(variants.map(v => v.color))].map(c => `
            <button 
              class="color-btn ${c===selectedColor?'active':''}"
              onclick="selectColor('${c}')">
              ${c}
            </button>
          `).join("")}
        </div>

        <!-- SIZE -->
        <label>Size</label>
        <div>
          ${filtered.map(v => `
            <button 
              class="color-btn ${v.size===selectedSize?'active':''}"
              onclick="selectSize('${v.size}')">
              ${v.size}
            </button>
          `).join("")}
        </div>

        <br>

        <button onclick="addToCart(${current.id})">
          Add to Cart
        </button>

      </div>

    </div>
  `;
}

/* SELECT COLOR */
function selectColor(color){
  selectedColor = color;

  // auto adjust size
  const sizes = product.variants.filter(v=>v.color===color);
  selectedSize = sizes[0].size;

  render();
}

/* SELECT SIZE */
function selectSize(size){
  selectedSize = size;
  render();
}

/* CART */
function addToCart(variantId){

  if(!cart[variantId]){
    cart[variantId] = { qty: 0 };
  }

  cart[variantId].qty++;

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCart();
  alert("Added to cart");
}

function updateCart(){
  let count = 0;
  Object.values(cart).forEach(i=>count+=i.qty);
  document.getElementById("cartCount").innerText = count;
}

function goHome(){
  window.location.href = "/";
}
</script>

</body>
</html>
