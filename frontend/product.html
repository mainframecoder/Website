<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div style="display:flex;justify-content:space-between;padding:20px">
    <h1 onclick="goHome()">My Store</h1>
    <div>Cart (<span id="cartCount">0</span>)</div>
  </div>
</header>

<div id="productDetail"></div>

<script>
const API = "https://website-9gq9.onrender.com";
let cart = JSON.parse(localStorage.getItem("cart")) || {};

updateCart();

/* LOAD PRODUCT */
const id = new URLSearchParams(window.location.search).get("id");

fetch(`${API}/products/${id}`)
  .then(res => res.json())
  .then(p => {

    let images = p.images.map(img =>
      `<img src="${img}" style="width:70px;margin:5px;cursor:pointer"
            onclick="change('${img}')">`
    ).join("");

    let colors = p.colors.map(c =>
      `<option>${c}</option>`
    ).join("");

    document.getElementById("productDetail").innerHTML = `
      <div style="display:flex;gap:40px;padding:40px">

        <div>
          <img id="main" src="${p.images[0]}" style="width:350px">
          <div>${images}</div>
        </div>

        <div>
          <h1>${p.name}</h1>
          <h2>$${p.price}</h2>

          <p>${p.description}</p>

          <label>Size:</label>
          <select>${p.sizes.map(s=>`<option>${s}</option>`).join("")}</select>

          <br><br>

          <label>Color:</label>
          <select>${colors}</select>

          <br><br>

          <button onclick="add(${p.id})">Add to Cart</button>
        </div>

      </div>
    `;
  });

function change(src){
  document.getElementById("main").src = src;
}

function add(id){
  cart[id] = (cart[id] || 0) + 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText =
    Object.values(cart).reduce((a,b)=>a+b,0);
}

function goHome(){
  window.location.href = "/";
}
</script>

</body>
</html>
