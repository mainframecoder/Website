<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <h1 onclick="goHome()">My Store</h1>
    <div>Cart (<span id="cartCount">0</span>)</div>
  </div>
</header>

<div class="container" id="productPage"></div>

<script>
const API = "https://website-9gq9.onrender.com";
let cart = JSON.parse(localStorage.getItem("cart")||"{}");

const id = new URLSearchParams(location.search).get("id");

fetch(API+"/products/"+id)
.then(r=>r.json())
.then(p=>{

  let imgs = Object.values(p.color_images)[0];

  document.getElementById("productPage").innerHTML=`
    <div class="product">

      <div>
        <img id="main" src="${imgs[0]}" class="main-img">
        <div class="thumbs">
          ${imgs.map(i=>`<img src="${i}" onclick="document.getElementById('main').src='${i}'">`).join("")}
        </div>
      </div>

      <div>
        <h1>${p.name}</h1>
        <h2>$${p.price}</h2>
        <p>${p.description}</p>

        <button onclick="add(${p.id})">Add to Cart</button>
      </div>

    </div>
  `;
});

function add(id){
  if(!cart[id]) cart[id]={qty:0};
  cart[id].qty++;
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("Added");
}

function goHome(){ location.href="/"; }
</script>

</body>
</html>
