<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <h1 onclick="goHome()">My Store</h1>
    <div>Cart (<span id="cartCount">0</span>)</div>
  </div>
</header>

<div class="container" id="productPage"></div>

<script src="script.js"></script>

<script>
const id = new URLSearchParams(location.search).get("id");

fetch(API + "/products/" + id)
.then(res => res.json())
.then(p => {

  let selected = p.variants[0];

  function render(){

    const colors = [...new Set(p.variants.map(v => v.color))];
    const sizes = p.variants.filter(v => v.color === selected.color);

    document.getElementById("productPage").innerHTML = `
      <div class="product">

        <div>
          <img src="${selected.image}" class="main-img">
        </div>

        <div>
          <h1>${p.name}</h1>
          <h2>$${selected.price}</h2>
          <p>${p.description}</p>

          <label>Color</label>
          <div>
            ${colors.map(c=>`
              <button class="${c===selected.color?'active':''}"
                onclick="selectColor('${c}')">${c}</button>
            `).join("")}
          </div>

          <label>Size</label>
          <div>
            ${sizes.map(s=>`
              <button onclick="selectSize('${s.size}')">${s.size}</button>
            `).join("")}
          </div>

          <br>
          <button onclick="addToCart(${selected.id})">Add to Cart</button>
        </div>

      </div>
    `;
  }

  window.selectColor = (c)=>{
    selected = p.variants.find(v => v.color === c);
    render();
  }

  window.selectSize = (s)=>{
    selected = p.variants.find(v => v.size === s && v.color === selected.color);
    render();
  }

  render();
});

updateCart();
</script>

</body>
</html>
