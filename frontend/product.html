<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1 onclick="location.href='/'">My Store</h1>
  <div>Cart (<span id="cartCount">0</span>)</div>
</header>

<div id="product"></div>

<script>
const API = "https://website-9gq9.onrender.com";
let cart = JSON.parse(localStorage.getItem("cart")) || {};

updateCart();

const id = new URLSearchParams(location.search).get("id");

fetch(API + "/products/" + id)
.then(r=>r.json())
.then(p=>{
  let color = "Red";
  let size = "M";

  render(p, color);

  function render(p, color){
    let imgs = p.colors[color];

    document.getElementById("product").innerHTML = `
      <div class="product">

        <div>
          <img id="main" src="${imgs[0]}" class="main-img">

          <div class="thumbs">
            ${imgs.map(i=>`<img src="${i}" onclick="change('${i}')">`).join("")}
          </div>
        </div>

        <div>
          <h1>${p.name}</h1>
          <h2>$${p.price}</h2>

          <p>${p.description}</p>

          <label>Size</label>
          <select onchange="size=this.value">
            ${p.sizes.map(s=>`<option>${s}</option>`).join("")}
          </select>

          <label>Color</label>
          <select onchange="color=this.value;render(p,color)">
            ${Object.keys(p.colors).map(c=>`<option>${c}</option>`).join("")}
          </select>

          <button onclick="add(${p.id})" class="btn">Add to Cart</button>
        </div>

      </div>
    `;
  }
});

function change(src){
  document.getElementById("main").src = src;
}

function add(id){
  cart[id] = {qty:(cart[id]?.qty||0)+1};
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  let c=0;
  Object.values(cart).forEach(i=>c+=i.qty);
  document.getElementById("cartCount").innerText=c;
}
</script>

</body>
</html>
