<!DOCTYPE html>
<html>
<body>

<div id="p"></div>

<script>
const id=new URLSearchParams(location.search).get("id");
const p=window.opener.products.find(x=>x.id==id);

document.getElementById("p").innerHTML=`
<h1>${p.name}</h1>
<img src="${p.image}" width="300">
<button onclick="add()">Add</button>
`;

function add(){
  window.opener.cart.push(p);
  window.opener.update();
}
</script>

</body>
</html>
