<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <h1 onclick="goHome()">My Store</h1>
  </div>
</header>

<div class="container">
  <h2>Your Orders</h2>
  <div id="orders"></div>
</div>

<script src="script.js"></script>

<script>
const email = localStorage.getItem("user");

if(!email){
  document.getElementById("orders").innerHTML = "Login first";
}else{
  fetch(API + "/orders/user/" + email)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("orders").innerHTML =
      data.map(o=>`
        <div class="card">
          <p>ID: ${o.id}</p>
          <p>Status: ${o.status}</p>
          <p>Total: $${o.total}</p>
          <button onclick="goTrack(${o.id})">Track</button>
        </div>
      `).join("");
  });
}

function goTrack(id){
  window.location.href = "track.html?order_id=" + id;
}
</script>

</body>
</html>
