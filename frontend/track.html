<!DOCTYPE html>
<html>
<head>
  <title>Track Order</title>
</head>
<body style="font-family:Arial; padding:40px">

<h1>📦 Order Tracking</h1>

<div id="status"></div>

<script>
const steps = [
  "Order Placed",
  "Packed",
  "Shipped",
  "Out for Delivery",
  "Delivered"
];

// fake progress (for now)
let current = Math.floor(Math.random() * 5);

document.getElementById("status").innerHTML =
  steps.map((s, i) => `
    <p style="color:${i <= current ? "green" : "gray"}">
      ${i <= current ? "✔" : "○"} ${s}
    </p>
  `).join("");
</script>

</body>
</html>
