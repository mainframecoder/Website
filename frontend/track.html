<!DOCTYPE html>
<html>
<head>
  <title>Track Order</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="container header-inner">
    <h1 onclick="goHome()">🛒 My Store</h1>
  </div>
</header>

<div class="container" style="margin-top:80px;text-align:center;">
  <h1>📦 Track Your Order</h1>

  <input id="orderId" placeholder="Enter Order ID">
  <button class="checkout-btn" onclick="track()">Track</button>

  <div id="result" style="margin-top:20px;"></div>
</div>

<script>
const API = "https://website-9gq9.onrender.com";

function goHome(){
  window.location.href = "/";
}

function track() {
  const id = document.getElementById("orderId").value;

  fetch(`${API}/orders/${id}`)
    .then(res => res.json())
    .then(data => {

      let items = data.items.map(i => `
        <div>Product ${i.id} x ${i.qty}</div>
      `).join("");

      document.getElementById("result").innerHTML = `
        <div class="box">
          <p>Status: ${data.status}</p>
          <p>Total: $${data.total}</p>
          ${items}
        </div>
      `;
    });
}

/* LIVE REFRESH */
setInterval(track, 5000);
</script>

</body>
</html>
