<!DOCTYPE html>
<html>
<head>
  <title>Track Order</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="container header-inner">
    <h1 onclick="goHome()">🛒 My Store</h1>
  </div>
</header>

<div class="container" style="margin-top:80px;text-align:center;">

  <h1>📦 Track Your Order</h1>

  <input id="orderId" placeholder="Enter Order ID">
  <button class="checkout-btn" onclick="track()">Track</button>

  <div id="result" style="margin-top:20px;"></div>

</div>

<script>
function goHome(){
  window.location.href = "/";
}

function track() {
  const id = document.getElementById("orderId").value;

  fetch(`https://website-9gq9.onrender.com/orders/${id}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("result").innerHTML = `
        <div style="background:#1e293b;padding:20px;border-radius:12px;">
          <p><b>Status:</b> ${data.status}</p>
          <p><b>Total:</b> $${data.total}</p>
        </div>
      `;
    })
    .catch(() => {
      document.getElementById("result").innerText = "Order not found";
    });
}
</script>

</body>
</html>
