<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <h1 onclick="goHome()">Admin Panel</h1>
  </div>
</header>

<div class="container">

  <h2>Create Product</h2>

  <input id="pname" placeholder="Product Name">
  <input id="pdesc" placeholder="Description">

  <button onclick="createProduct()">Create</button>

  <hr>

  <h2>Add Variant</h2>

  <input id="vid" placeholder="Product ID">
  <input id="vcolor" placeholder="Color">
  <input id="vsize" placeholder="Size">
  <input id="vprice" placeholder="Price">
  <input id="vimage" placeholder="Image URL">

  <button onclick="addVariant()">Add Variant</button>

  <hr>

  <h2>Products</h2>
  <div id="products"></div>

</div>

<script>
const API = "https://website-9gq9.onrender.com";

/* LOAD PRODUCTS */
async function loadProducts(){
  const res = await fetch(API + "/products");
  const data = await res.json();

  document.getElementById("products").innerHTML = data.map(p=>`
    <div style="margin-bottom:20px;padding:10px;background:#1e293b;border-radius:10px;">
      <b>${p.name}</b><br>
      ${p.variants.length} variants
    </div>
  `).join("");
}

/* CREATE PRODUCT */
async function createProduct(){
  const name = document.getElementById("pname").value;
  const description = document.getElementById("pdesc").value;

  const res = await fetch(API + "/products",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name, description})
  });

  const data = await res.json();

  alert("Product created ID: " + data.id);

  loadProducts();
}

/* ADD VARIANT */
async function addVariant(){
  const id = document.getElementById("vid").value;

  const color = document.getElementById("vcolor").value;
  const size = document.getElementById("vsize").value;
  const price = document.getElementById("vprice").value;
  const image = document.getElementById("vimage").value;

  const res = await fetch(API + "/products/" + id + "/variant",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({color,size,price,image})
  });

  const data = await res.json();

  alert(data.msg);

  loadProducts();
}

/* NAV */
function goHome(){
  window.location.href = "/";
}

/* INIT */
loadProducts();
</script>

</body>
</html>
