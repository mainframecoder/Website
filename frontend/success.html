<!DOCTYPE html>
<html>
<head>
  <title>Payment Success</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding-top:100px">

<h1>✅ Payment Successful</h1>

<p id="orderInfo">Loading order...</p>

<a href="/">Go back to store</a>

<script>
const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id");

fetch(`https://website-9gq9.onrender.com/orders/${orderId}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("orderInfo").innerHTML = `
      <b>Order ID:</b> ${data.id} <br>
      <b>Total:</b> $${data.total} <br>
      <b>Status:</b> ${data.status}
    `;
  })
  .catch(() => {
    document.getElementById("orderInfo").innerText = "Error loading order";
  });
</script>

</body>
</html>
